name: Build macOS Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        brew install tesseract
        pip install pytesseract Pillow requests mss pyinstaller

    - name: Build with PyInstaller (.app bundle)
      run: |
        # Usamos --windowed y --noconfirm para generar el .app
        pyinstaller --noconfirm --windowed --name "MensajeServidor_Mac_v3" server_mac_v3.py

    - name: Upload Artifact (.app)
      uses: actions/upload-artifact@v4
      with:
        name: MensajeServidor_Mac_v3_App
        path: dist/MensajeServidor_Mac_v3.app
