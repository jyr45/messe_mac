name: Build macOS Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        brew install tesseract
        pip install pytesseract Pillow requests mss pyinstaller

    - name: Build with PyInstaller (.app bundle)
      run: |
        pyinstaller --noconfirm --windowed --name "MensajeServidor_Mac_v3" server_mac_v3.py

    - name: Create DMG
      run: |
        # Instalamos una herramienta para crear DMGs fácilmente
        brew install create-dmg
        mkdir -p dist/dmg
        create-dmg \
          --volname "Mensaje Servidor Installer" \
          --window-pos 200 120 \
          --window-size 800 400 \
          --icon-size 100 \
          --icon "MensajeServidor_Mac_v3.app" 200 190 \
          --hide-extension "MensajeServidor_Mac_v3.app" \
          --app-drop-link 600 185 \
          "dist/MensajeServidor_Mac_v3.dmg" \
          "dist/MensajeServidor_Mac_v3.app"

    - name: Upload Artifact (DMG)
      uses: actions/upload-artifact@v4
      with:
        name: MensajeServidor_Mac_v3_DMG
        path: dist/MensajeServidor_Mac_v3.dmg
